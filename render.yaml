# render.yaml - Render Infrastructure as Code
# https://render.com/docs/infrastructure-as-code
#
# 使用方法:
# 1. このファイルをリポジトリのルートに配置
# 2. Render Dashboard で "Blueprint" として読み込む
# 3. 環境変数は Render Dashboard で手動設定（セキュリティのため）

services:
  # ============================================================
  # メインWebアプリケーション
  # ============================================================
  - type: web
    name: meet-correction-app
    runtime: node
    plan: starter  # $7/月 (Sleepなし、Cron Job対応)
    region: oregon
    branch: main
    buildCommand: "npm install && npm run db:generate && npm run build"
    startCommand: "npm run db:migrate && npm start"
    healthCheckPath: /api/health
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: meet-correction-db
          property: connectionString
      # 以下はRender Dashboardで手動設定
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true  # 自動生成
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true  # 自動生成（32文字以上になるよう確認）
      - key: INTERNAL_API_KEY
        generateValue: true  # 自動生成
      - key: APP_URL
        sync: false

  # ============================================================
  # Cron Job 1: イベントスキャン（5分ごと）
  # ============================================================
  - type: cron
    name: meet-scan-events
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: "npm install"
    schedule: "*/5 * * * *"
    command: >
      curl -X POST $APP_URL/api/internal/scan-events
      -H "Authorization: Bearer $INTERNAL_API_KEY"
      -H "Content-Type: application/json"
      --fail --silent --show-error
    
    envVars:
      - key: APP_URL
        sync: false
      - key: INTERNAL_API_KEY
        sync: false

  # ============================================================
  # Cron Job 2: 開始前再確認（5分ごと）
  # ============================================================
  - type: cron
    name: meet-pre-check
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: "npm install"
    schedule: "*/5 * * * *"
    command: >
      curl -X POST $APP_URL/api/internal/pre-check
      -H "Authorization: Bearer $INTERNAL_API_KEY"
      -H "Content-Type: application/json"
      --fail --silent --show-error
    
    envVars:
      - key: APP_URL
        sync: false
      - key: INTERNAL_API_KEY
        sync: false

  # ============================================================
  # Cron Job 3: トークンリフレッシュ（1時間ごと）
  # ============================================================
  - type: cron
    name: meet-refresh-tokens
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: "npm install"
    schedule: "0 * * * *"
    command: >
      curl -X POST $APP_URL/api/internal/refresh-tokens
      -H "Authorization: Bearer $INTERNAL_API_KEY"
      -H "Content-Type: application/json"
      --fail --silent --show-error
    
    envVars:
      - key: APP_URL
        sync: false
      - key: INTERNAL_API_KEY
        sync: false

# ============================================================
# データベース
# ============================================================
databases:
  - name: meet-correction-db
    databaseName: meet_correction
    plan: starter  # $7/月
    region: oregon
    ipAllowList: []  # 全IPを許可（Renderの内部ネットワークは信頼）
